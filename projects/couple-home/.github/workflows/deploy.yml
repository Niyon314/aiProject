name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/couple-home-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/couple-home-home-frontend
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}

jobs:
  # ========== 测试阶段 ==========
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: projects/couple-home/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: projects/couple-home/h5-app/package-lock.json

      - name: Backend - Download dependencies
        working-directory: projects/couple-home
        run: go mod download

      - name: Backend - Run tests
        working-directory: projects/couple-home
        run: go test -v ./...

      - name: Backend - Build check
        working-directory: projects/couple-home
        run: go build -v .

      - name: Frontend - Install dependencies
        working-directory: projects/couple-home/h5-app
        run: npm ci

      - name: Frontend - Lint
        working-directory: projects/couple-home/h5-app
        run: npm run lint

      - name: Frontend - Build
        working-directory: projects/couple-home/h5-app
        run: npm run build

  # ========== 构建和推送 Docker 镜像 ==========
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/couple-home
          file: ./projects/couple-home/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/couple-home/h5-app
          file: ./projects/couple-home/h5-app/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  # ========== 部署到服务器 ==========
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            cd /opt/couple-home
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            sleep 5
            curl -f http://localhost:8080/health || exit 1
          EOF

  # ========== 发送部署成功通知 ==========
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && (needs.deploy.result == 'success' || needs.deploy.result == 'failure')
    steps:
      - name: Send success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ 部署成功！"
          echo "提交：${{ github.sha }}"
          echo "时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "查看：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ 部署失败！"
          echo "提交：${{ github.sha }}"
          echo "时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "查看：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
